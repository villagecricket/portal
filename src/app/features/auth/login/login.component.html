<div class="auth-shell">
  <mat-card class="login-card mat-elevation-z8">
    <div class="brand-block">
      <div class="brand-badge">KKK</div>
      <h1>Admin Portal</h1>
      <p>Sign in to manage players, teams, auctions, and registrations.</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Email or Phone</mat-label>
        <input matInput type="text" formControlName="username" placeholder="you@company.com or 9876543210" />
        <mat-icon matSuffix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" type="password" placeholder="Enter your password" />
        <mat-icon matSuffix>lock</mat-icon>
      </mat-form-field>

      <div *ngIf="errorMessage" class="error-text">{{ errorMessage }}</div>

      <button mat-flat-button color="primary" class="submit-btn" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Sign In</span>
        <span *ngIf="loading" class="spinner-inline">
          <mat-spinner diameter="18"></mat-spinner>
          Signing in...
        </span>
      </button>

      <button mat-stroked-button color="primary" class="submit-btn" type="button" routerLink="/register">
        Create an account
      </button>
    </form>
  </mat-card>
</div>
