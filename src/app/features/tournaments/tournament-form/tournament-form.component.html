<div class="teams-form-container animate-fade">
    <form [formGroup]="tournamentForm" (ngSubmit)="onSubmit()">

        <!-- Advanced Branding Identity Zone (Mirroring Reference Image Exactly) -->
        <div class="branding-hero-zone">
            <!-- Full Width Banner Container -->
            <div class="banner-container">
                <app-image-upload [id]="'banner'" [control]="tournamentForm.get('BannerURL')!"
                    [defaultUrl]="tournamentForm.get('BannerURL')!.value"></app-image-upload>
            </div>

            <!-- Overlapping Circular Logo -->
            <div class="logo-overlap-circle">
                <app-image-upload [control]="tournamentForm.get('LogoURL')!"
                    [defaultUrl]="tournamentForm.get('LogoURL')!.value"></app-image-upload>
            </div>
        </div>

        <div class="tournament-form-container">
            <div class="form-grid">
                <!-- Left Column: Settings & Logic -->
                <div class="sidebar-section">
                    <div class="sticky-wrapper">
                        <div class="premium-card">
                            <h5 class="section-title"><i class="bi bi-gear-fill me-2"></i>Event Logic</h5>
                            <div class="text-start space-y-4">
                                <app-select label="Publication Status" [control]="tournamentForm.get('Status')!"
                                    [options]="tournamentStatuses"></app-select>

                                <app-select label="Match Format" [control]="tournamentForm.get('MatchFormat')!"
                                    [options]="matchFormats"></app-select>
                                    
                                <app-select label="Ball Type" [control]="tournamentForm.get('BallType')!"
                                    [options]="ballTypes"></app-select>

                                <app-input label="Overs Per Match" [control]="tournamentForm.get('OversPerMatch')!"
                                    type="number" />
                            </div>
                        </div>

                        <div class="premium-card bg-dark text-white p-4">
                            <h6 class="fw-bold text-danger mb-2">Pro Visibility</h6>
                            <p class="small mb-0 opacity-75">Upload a clean banner for maximum impact on the home
                                screen.</p>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Full Profile -->
                <div class="main-content-section">

                    <!-- Identity Section -->
                    <div class="premium-card">
                        <h5 class="section-title"><i class="bi bi-trophy-fill me-2"></i>Tournament Profile</h5>
                        <div class="row g-4">
                            <div class="col-12">
                                <app-input label="Tournament Display Name *" [control]="tournamentForm.get('Name')!"
                                    placeholder="e.g. Village Premier League 2026" type="text" />
                            </div>
                            <div class="col-md-6">
                                <app-input label="City / Location *" [control]="tournamentForm.get('City')!"
                                    placeholder="e.g. Bangalore" type="text" />
                            </div>
                            <div class="col-md-6">
                                <app-input label="Primary Venue *" [control]="tournamentForm.get('VenueName')!"
                                    placeholder="e.g. M. Chinnaswamy Stadium" type="text" />
                            </div>
                            <div class="col-md-6">
                                <app-input label="Organizer Name *" [control]="tournamentForm.get('Organizer')!"
                                    placeholder="Rahul" type="text" />
                            </div>
                            <div class="col-md-6">
                                <app-input label="Contact Phone *" [control]="tournamentForm.get('ContactPhone')!"
                                    placeholder="6381353685" type="tel" />
                            </div>
                        </div>
                    </div>

                    <!-- Schedule Section -->
                    <div class="premium-card">
                        <h5 class="section-title"><i class="bi bi-calendar-event-fill me-2"></i>Timeline</h5>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <app-datepicker label="Start Date *"
                                    [control]="tournamentForm.get('StartDate')!"></app-datepicker>
                            </div>
                            <div class="col-md-6">
                                <app-datepicker label="End Date *"
                                    [control]="tournamentForm.get('EndDate')!"></app-datepicker>
                            </div>
                        </div>
                    </div>

                    <!-- Financial & Prizes -->
                    <div class="premium-card">
                        <h5 class="section-title"><i class="bi bi-wallet2 me-2"></i>Financial & Prizes</h5>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <app-input label="Team Registration Fee (₹)" type="number"
                                    [control]="tournamentForm.get('RegistrationFee')!"></app-input>
                            </div>
                            
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label class="form-label text-secondary fw-semibold">Number of Prizes</label>
                                    <input type="number" class="form-control" placeholder="e.g. 3" 
                                           (input)="updatePrizeCount($event)" [value]="prizeDetails.length" min="0" max="20">
                                </div>
                            </div>
                            
                            <div class="col-12" *ngIf="prizeDetails.length > 0">
                                <h6 class="fw-bold mb-3">Prize Distribution</h6>
                                <div class="row g-3" [formGroup]="tournamentForm">
                                    <ng-container formArrayName="PrizeDetails">
                                        <div class="col-md-6" *ngFor="let prize of prizeDetails.controls; let i = index" [formGroupName]="i">
                                            <div class="d-flex gap-2">
                                                <div class="flex-grow-1">
                                                    <input type="text" class="form-control mb-2" formControlName="title" placeholder="Prize Title (e.g. Winner)">
                                                </div>
                                                <div class="flex-grow-1">
                                                    <input type="number" class="form-control" formControlName="amount" placeholder="Amount (₹)">
                                                </div>
                                            </div>
                                        </div>
                                    </ng-container>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Team Management -->
                    <div class="premium-card">
                        <h5 class="section-title"><i class="bi bi-people-fill me-2"></i>Participating Teams</h5>
                        <div class="team-selection-grid">
                            <div class="team-checkbox-card" *ngFor="let team of availableTeams()"
                                [class.selected]="isSelected(team.TeamID)" (click)="toggleTeam(team.TeamID)">
                                <img [src]="team.FullLogoURL" class="team-badge">
                                <span class="team-name text-truncate">{{ team.Name }}</span>
                                <i class="bi bi-check-circle-fill text-danger ms-auto"
                                    *ngIf="isSelected(team.TeamID)"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Form Bottom Actions -->
                    <div class="pt-4 d-flex gap-3">
                        <button type="button" class="btn btn-outline-secondary rounded-pill px-5"
                            (click)="cancel()">Discard</button>
                        <button type="submit" class="btn btn-danger rounded-pill px-5 fw-bold shadow-sm"
                            [disabled]="tournamentForm.invalid || isSubmitting()">
                            <span class="spinner-border spinner-border-sm me-2" *ngIf="isSubmitting()"></span>
                            {{ isEdit ? 'Sync Changes' : 'Launch Tournament' }}
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </form>
</div>
