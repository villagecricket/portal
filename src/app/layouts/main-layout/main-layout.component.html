<mat-sidenav-container class="sidenav-container">
  <!-- Sidebar -->
  <mat-sidenav #drawer mode="side" [opened]="sidebarOpen" class="sidenav" fixedInViewport>
    <!-- <div class="sidebar-header">
      <img src="assets/logo.png" alt="Logo" class="logo" alt="RAHUL" />
    </div> -->
    <app-sidebar [visible]="sidebarOpen"></app-sidebar>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content>
    <!-- Header -->
    <app-header (toggleSidebar)="toggleSidebar()"></app-header>
    <app-breadcrumb></app-breadcrumb> <!-- breadcrumb added here -->

    <!-- Main router content -->
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>

    <!-- Footer -->
    <app-footer></app-footer>
  </mat-sidenav-content>
</mat-sidenav-container>
