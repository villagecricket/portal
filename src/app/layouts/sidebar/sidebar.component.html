<div class="sidebar-container">
  <!-- Logo Section -->
  <div class="logo-section d-flex align-items-center mb-4 px-3 pt-3">
    <div class="logo-icon bg-white rounded-circle d-flex align-items-center justify-content-center me-3"
      style="width: 32px; height: 32px; overflow: hidden;">
      <ng-container *ngIf="appSettings.logoUrl; else defaultLogo">
        <img [src]="appSettings.logoUrl" alt="Logo" style="width: 100%; height: 100%; object-fit: cover;">
      </ng-container>
      <ng-template #defaultLogo>
        <i class="bi bi-diagram-3-fill" style="color: var(--primary-color); font-size: 16px;"></i>
      </ng-template>
    </div>
    <div class="logo-text" *ngIf="visible">
      <h6 class="m-0 fw-bold text-white tracking-wider" style="font-size: 0.95rem;">{{ appSettings.appName }}</h6>
      <small class="text-white-50" style="font-size: 0.65rem;">v1.0.0</small>
    </div>
  </div>

  <mat-nav-list *ngIf="visible && (user$ | async)" class="sidebar-nav">
    <ng-container *ngFor="let section of filteredMenu">
      <!-- Section Header (Optional) -->
      <div class="section-label text-uppercase text-white-50 px-3 py-2 mt-2 mb-1 fw-bold"
        style="font-size: 0.7rem; letter-spacing: 1px;" *ngIf="section.label">
        {{ section.label }}
      </div>

      <a mat-list-item *ngFor="let item of section.items" [routerLink]="item.route" routerLinkActive="active-link"
        class="sidebar-link mb-1">
        <div class="sidebar-item-wrapper d-flex align-items-center px-3 py-2 rounded-3">
          <mat-icon class="sidebar-icon me-3">{{ item.icon }}</mat-icon>
          <span class="sidebar-label">{{ item.label }}</span>
        </div>
      </a>
    </ng-container>
  </mat-nav-list>

  <!-- User Profile & Powered By Section -->
  <div class="sidebar-footer mt-auto px-3 py-3" *ngIf="visible">
    <!-- Powered By -->
    <div class="sidebar-powered-by p-3 mx-2 mb-3 rounded-3 d-flex align-items-center justify-content-between gap-2" style="background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.05);">
      <span class="text-white-50 fw-bold flex-shrink-0" style="font-size: 0.6rem; letter-spacing: 1px; text-transform: uppercase;">Powered By</span>
      <img src="assets/ravens-analytics.png" alt="The Ravens Analytics" style="width: 100%; max-width: 120px; height: 45px; object-fit: contain; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
    </div>
  </div>
</div>
